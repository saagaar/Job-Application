<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 360px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #f9fafb;
    }

    /* Header */
    .header {
      background: #0a66c2;
      color: #fff;
      padding: 14px 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 15px; font-weight: 700; }
    .api-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #6b7280;
      transition: background 0.3s;
    }
    .api-dot.online  { background: #36b37e; }
    .api-dot.offline { background: #ef4444; }

    /* Empty state */
    .empty {
      padding: 40px 16px;
      text-align: center;
      color: #6b7280;
      line-height: 1.6;
    }
    .empty svg { margin-bottom: 10px; opacity: 0.4; }

    /* Job list */
    #job-list { max-height: 340px; overflow-y: auto; }

    .job-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid #e5e7eb;
      background: #fff;
    }
    .job-item:last-child { border-bottom: none; }

    .job-info { flex: 1; min-width: 0; }
    .job-title {
      font-weight: 600;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #0a66c2;
    }
    .job-meta {
      font-size: 11px;
      color: #6b7280;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .remove-btn {
      flex-shrink: 0;
      background: none;
      border: none;
      cursor: pointer;
      color: #9ca3af;
      padding: 2px;
      border-radius: 4px;
      line-height: 1;
    }
    .remove-btn:hover { color: #ef4444; background: #fef2f2; }

    /* Footer */
    .footer {
      padding: 12px 14px;
      border-top: 1px solid #e5e7eb;
      background: #fff;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .footer-meta { font-size: 11px; color: #6b7280; }

    .btn {
      width: 100%;
      padding: 9px 14px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn-primary { background: #0a66c2; color: #fff; }
    .btn-primary:hover { background: #004182; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-ghost { background: #f1f5f9; color: #64748b; }
    .btn-ghost:hover { background: #e2e8f0; }

    /* Status bar */
    #status-bar {
      font-size: 12px;
      text-align: center;
      padding: 6px 14px;
      border-radius: 6px;
      display: none;
    }
    #status-bar.ok   { background: #ecfdf5; color: #047857; display: block; }
    #status-bar.err  { background: #fef2f2; color: #b91c1c; display: block; }
    #status-bar.info { background: #eff6ff; color: #1d4ed8; display: block; }

    /* Settings panel */
    .settings-panel {
      border-top: 1px solid #e5e7eb;
      background: #f9fafb;
    }
    .settings-panel summary {
      padding: 8px 14px;
      font-size: 11px;
      color: #6b7280;
      cursor: pointer;
      user-select: none;
      list-style: none;
    }
    .settings-panel summary::-webkit-details-marker { display: none; }
    .settings-panel summary::before { content: '⚙ '; }
    .settings-row {
      display: flex;
      gap: 6px;
      padding: 0 14px 10px;
    }
    .settings-row input {
      flex: 1;
      padding: 5px 8px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 11px;
      color: #374151;
      background: #fff;
    }
    .settings-row input:focus { outline: 2px solid #0a66c2; border-color: transparent; }
    .btn-save {
      padding: 5px 10px;
      background: #0a66c2;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-save:hover { background: #004182; }

    /* Score toggle */
    .score-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: #374151;
    }
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #d1d5db;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-slider:before {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      left: 3px; top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .toggle-slider { background: #0a66c2; }
    .toggle input:checked + .toggle-slider:before { transform: translateX(16px); }
  </style>
</head>
<body>
  <div class="header">
    <h1>Job Tracker</h1>
    <div id="api-dot" class="api-dot" title="API status"></div>
  </div>

  <div id="empty-state" class="empty" style="display:none">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
    </svg>
    <p>No jobs saved yet.</p>
    <p style="margin-top:6px; font-size:12px">Open LinkedIn Jobs and click the<br><strong>bookmark button</strong> on any listing.</p>
  </div>

  <div id="job-list"></div>

  <div id="footer" class="footer" style="display:none">
    <div class="score-row">
      <span>Score with AI after import</span>
      <label class="toggle">
        <input type="checkbox" id="score-toggle" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div id="status-bar"></div>
    <button id="send-btn" class="btn btn-primary">Send to Job Tracker</button>
    <button id="clear-btn" class="btn btn-ghost">Clear queue</button>
  </div>

  <details class="settings-panel">
    <summary>API settings</summary>
    <div class="settings-row">
      <input type="url" id="api-base-input" placeholder="http://localhost:8000">
      <button id="api-base-save" class="btn-save">Save</button>
    </div>
  </details>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
